spring.application.name=Smart School Report Card System
server.port=8080

# ===============================
# Database Configuration - H2 (Offline)
# ===============================
spring.datasource.url=jdbc:h2:file:./data/reportdb;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===============================
# Hibernate / JPA Settings
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ===============================
# Thymeleaf
# ===============================
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# ===============================
# Logging
# ===============================
logging.level.root=WARN
logging.level.com.akentech.schoolreport=INFO
spring.main.banner-mode=off

# ===============================
# Web Resources
# ===============================
spring.web.resources.add-mappings=true

# Disable FAIL_ON_EMPTY_BEANS globally
spring.jackson.serialization.fail-on-empty-beans=false

# application.properties
spring.main.allow-circular-references=true
spring.jpa.open-in-view=false
